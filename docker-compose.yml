services:
  web:
    build: .
    container_name: footprint_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
#    environment:
#      APACHE_DOCUMENT_ROOT: /var/www/html

  db:
    image: mariadb:10.4
    container_name: footprint_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: footprint_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
#    ports:
#      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin
    container_name: footprint_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: footprint_db
    depends_on:
      - db